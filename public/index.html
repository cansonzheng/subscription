<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>订阅管理</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100%;
        padding: 40px 20px;
        display: flex;
        align-items: center;
      }

      #app {
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
      }

      .header {
        text-align: center;
        color: white;
        margin-bottom: 40px;
      }

      .header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 10px;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
      }

      .header p {
        font-size: 1.1rem;
        opacity: 0.9;
      }

      .login-container {
        max-width: 400px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      .login-form h2 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
        font-size: 1.5rem;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        color: #555;
        font-weight: 500;
        margin-bottom: 8px;
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1rem;
        transition: all 0.3s;
        font-family: inherit;
      }

      .form-group input:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
      }

      .form-group textarea {
        min-height: 200px;
        resize: vertical;
        font-family: "Monaco", "Consolas", monospace;
        font-size: 0.9rem;
      }

      .btn {
        padding: 14px 28px;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        width: 100%;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      }

      .btn-secondary {
        background: #f0f0f0;
        color: #333;
      }

      .btn-secondary:hover {
        background: #e0e0e0;
      }

      .btn-danger {
        background: #ff4757;
        color: white;
      }

      .btn-danger:hover {
        background: #ff3344;
      }

      .btn-sm {
        padding: 8px 16px;
        font-size: 0.875rem;
      }

      .dashboard {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      .top-actions {
        display: flex;
        justify-content: flex-end;
        gap: 15px;
        margin-bottom: 15px;
      }

      .dashboard-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 15px;
      }

      .dashboard-header h2 {
        color: #333;
        font-size: 1.5rem;
      }

      .header-actions {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .text-btn {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        font-size: 0.9rem;
        cursor: pointer;
        padding: 8px 16px;
        border-radius: 8px;
        transition: all 0.2s;
      }

      .text-btn:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .add-btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .add-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      }

      .group-list {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .group-card {
        background: #f8f9fa;
        border-radius: 16px;
        padding: 24px;
        border: 2px solid #e0e0e0;
        transition: all 0.3s;
      }

      .group-card:hover {
        border-color: #667eea;
        box-shadow: 0 10px 40px rgba(102, 126, 234, 0.15);
      }

      .group-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 10px;
      }

      .group-name {
        font-size: 1.25rem;
        font-weight: 600;
        color: #333;
      }

      .group-meta {
        font-size: 0.875rem;
        color: #888;
        margin-top: 4px;
      }

      .subscription-url-box {
        background: white;
        border-radius: 10px;
        padding: 12px 16px;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid #e0e0e0;
      }

      .subscription-url {
        font-family: "Monaco", "Consolas", monospace;
        font-size: 0.875rem;
        color: #667eea;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .group-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 20px;
        backdrop-filter: blur(4px);
      }

      .modal {
        background: white;
        border-radius: 20px;
        padding: 40px;
        width: 100%;
        max-width: 600px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }

      .modal-header h3 {
        font-size: 1.5rem;
        color: #333;
      }

      .close-btn {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #888;
        padding: 0;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: all 0.3s;
      }

      .close-btn:hover {
        background: #f0f0f0;
        color: #333;
      }

      .modal-footer {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 30px;
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #888;
      }

      .empty-state svg {
        width: 80px;
        height: 80px;
        margin-bottom: 20px;
        opacity: 0.5;
      }

      .empty-state p {
        font-size: 1.1rem;
      }

      .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 400px;
        color: white;
      }

      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .loading-text {
        margin-top: 20px;
        font-size: 1.1rem;
        opacity: 0.9;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .toast {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: #333;
        color: white;
        padding: 16px 24px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        z-index: 2000;
        animation: slideIn 0.3s ease;
      }

      .toast.success {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      }

      .toast.error {
        background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .copy-success {
        background: #38ef7d !important;
        color: #11998e !important;
      }

      .hint {
        font-size: 0.875rem;
        color: #888;
        margin-top: 8px;
      }

      @media (max-width: 768px) {
        body {
          padding: 20px 10px;
        }

        .dashboard {
          padding: 15px;
        }

        .dashboard-header {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }

        .top-actions {
          justify-content: flex-end;
        }

        .modal {
          padding: 30px 20px;
        }

        .subscription-url {
          word-break: break-all;
          white-space: normal;
        }

        .group-name {
          word-break: break-word;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Loading 状态 -->
      <div v-if="loading" class="loading-container">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中...</div>
      </div>

      <!-- 登录界面 -->
      <div v-else-if="!isLoggedIn" class="login-container">
        <form class="login-form" @submit.prevent="handleLogin">
          <h2>🔐 管理登录</h2>
          <div class="form-group">
            <label for="password">密码</label>
            <input
              type="password"
              id="password"
              v-model="loginForm.password"
              placeholder="请输入管理密码"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary">登录</button>
        </form>
      </div>

      <!-- 管理界面 -->
      <div v-else>
        <div class="top-actions">
          <button class="text-btn" @click="openPasswordModal">
            🔑 修改密码
          </button>
          <button class="text-btn" @click="handleLogout">退出登录</button>
        </div>
        <div class="dashboard">
          <div class="dashboard-header">
            <h2>📋 订阅分组列表</h2>
            <div class="header-actions">
              <button class="add-btn" @click="showAddModal">
                <span>➕</span> 添加分组
              </button>
            </div>
          </div>

          <div v-if="groups.length === 0" class="empty-state">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
              ></path>
            </svg>
            <p>暂无订阅分组，点击右上角按钮添加</p>
          </div>

          <div v-else class="group-list">
            <div v-for="group in groups" :key="group.id" class="group-card">
              <div class="group-header">
                <div>
                  <div class="group-name">{{ group.name }}</div>
                  <div class="group-meta">
                    创建于 {{ formatDate(group.createdAt) }}
                    <span v-if="group.updatedAt">
                      · 更新于 {{ formatDate(group.updatedAt) }}</span
                    >
                  </div>
                </div>
              </div>
              <div class="subscription-url-box">
                <span class="subscription-url"
                  >{{ getSubscriptionUrl(group.id) }}</span
                >
                <button
                  class="btn btn-secondary btn-sm"
                  @click="copyUrl(group.id)"
                >
                  📋 复制
                </button>
              </div>
              <div class="group-actions">
                <button
                  class="btn btn-secondary btn-sm"
                  @click="showEditModal(group)"
                >
                  ✏️ 编辑
                </button>
                <button
                  class="btn btn-danger btn-sm"
                  @click="deleteGroup(group.id)"
                >
                  🗑️ 删除
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 添加/编辑分组模态框 -->
      <div v-if="showModal" class="modal-overlay" @click.self="closeModal">
        <div class="modal">
          <div class="modal-header">
            <h3>{{ isEditing ? '✏️ 编辑分组' : '➕ 添加分组' }}</h3>
            <button class="close-btn" @click="closeModal">×</button>
          </div>
          <form @submit.prevent="saveGroup">
            <div class="form-group">
              <label for="groupName">分组名称</label>
              <input
                type="text"
                id="groupName"
                v-model="formData.name"
                placeholder="例如：机场订阅、自用节点等"
                required
              />
            </div>
            <div class="form-group">
              <label for="proxies">代理分享地址</label>
              <textarea
                id="proxies"
                v-model="formData.proxies"
                placeholder="请输入代理分享地址，每行一个"
                required
              ></textarea>
              <div class="hint">💡 支持多行输入，每行一个代理地址。</div>
            </div>
            <div class="modal-footer">
              <button type="submit" class="btn btn-primary">
                {{ isEditing ? '保存修改' : '创建分组' }}
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- 修改密码模态框 -->
      <div
        v-if="showPasswordModal"
        class="modal-overlay"
        @click.self="closePasswordModal"
      >
        <div class="modal">
          <div class="modal-header">
            <h3>🔑 修改密码</h3>
            <button class="close-btn" @click="closePasswordModal">×</button>
          </div>
          <form @submit.prevent="changePassword">
            <div class="form-group">
              <label for="oldPassword">原密码</label>
              <input
                type="password"
                id="oldPassword"
                v-model="passwordForm.oldPassword"
                placeholder="请输入原密码"
                required
              />
            </div>
            <div class="form-group">
              <label for="newPassword">新密码</label>
              <input
                type="password"
                id="newPassword"
                v-model="passwordForm.newPassword"
                placeholder="请输入新密码"
                required
              />
            </div>
            <div class="form-group">
              <label for="confirmPassword">确认新密码</label>
              <input
                type="password"
                id="confirmPassword"
                v-model="passwordForm.confirmPassword"
                placeholder="请再次输入新密码"
                required
              />
            </div>
            <div class="modal-footer">
              <button type="submit" class="btn btn-primary">确认修改</button>
            </div>
          </form>
        </div>
      </div>

      <!-- 提示消息 -->
      <div v-if="toast.message" class="toast" :class="toast.type">
        {{ toast.message }}
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
      const { createApp } = Vue;

      // MD5 加密
      function md5(str) {
        return CryptoJS.MD5(str).toString();
      }

      // 获取存储的 token
      function getToken() {
        return localStorage.getItem("authToken");
      }

      // 保存 token
      function setToken(token) {
        localStorage.setItem("authToken", token);
      }

      // 移除 token
      function removeToken() {
        localStorage.removeItem("authToken");
      }

      // 创建 axios 实例，自动添加 token
      const api = axios.create();
      api.interceptors.request.use((config) => {
        const token = getToken();
        if (token) {
          config.headers.Authorization = `Bearer ${token}`;
        }
        return config;
      });

      createApp({
        data() {
          return {
            loading: true,
            isLoggedIn: false,
            loginForm: {
              password: "",
            },
            passwordForm: {
              oldPassword: "",
              newPassword: "",
              confirmPassword: "",
            },
            groups: [],
            showModal: false,
            showPasswordModal: false,
            isEditing: false,
            editingGroupId: null,
            formData: {
              name: "",
              proxies: "",
            },
            toast: {
              message: "",
              type: "success",
            },
          };
        },
        async mounted() {
          await this.checkAuth();
          if (this.isLoggedIn) {
            await this.loadGroups();
          }
        },
        methods: {
          async checkAuth() {
            const token = getToken();
            if (!token) {
              this.loading = false;
              this.isLoggedIn = false;
              return;
            }
            try {
              const { data } = await api.get("/api/auth/status");
              this.isLoggedIn = data.loggedIn;
            } catch (error) {
              this.isLoggedIn = false;
              removeToken();
            } finally {
              this.loading = false;
            }
          },
          async handleLogin() {
            try {
              const { data } = await axios.post("/api/login", {
                password: md5(this.loginForm.password),
              });
              setToken(data.token);
              this.isLoggedIn = true;
              this.loginForm.password = "";
              await this.loadGroups();
              this.showToast("登录成功", "success");
            } catch (error) {
              this.showToast("密码错误", "error");
            }
          },
          handleLogout() {
            removeToken();
            this.isLoggedIn = false;
            this.groups = [];
            this.showToast("已退出登录", "success");
          },
          async loadGroups() {
            try {
              const { data } = await api.get("/api/groups");
              this.groups = data.groups;
            } catch (error) {
              this.showToast("加载分组失败", "error");
            }
          },
          showAddModal() {
            this.isEditing = false;
            this.formData = { name: "", proxies: "" };
            this.showModal = true;
          },
          showEditModal(group) {
            this.isEditing = true;
            this.editingGroupId = group.id;
            // 将数组转换为多行文本
            this.formData = {
              name: group.name,
              proxies: Array.isArray(group.proxies)
                ? group.proxies.join("\n")
                : group.proxies,
            };
            this.showModal = true;
          },
          closeModal() {
            this.showModal = false;
            this.isEditing = false;
            this.editingGroupId = null;
            this.formData = { name: "", proxies: "" };
          },
          openPasswordModal() {
            this.passwordForm = {
              oldPassword: "",
              newPassword: "",
              confirmPassword: "",
            };
            this.showPasswordModal = true;
          },
          closePasswordModal() {
            this.showPasswordModal = false;
            this.passwordForm = {
              oldPassword: "",
              newPassword: "",
              confirmPassword: "",
            };
          },
          async changePassword() {
            if (
              this.passwordForm.newPassword !==
              this.passwordForm.confirmPassword
            ) {
              this.showToast("两次输入的新密码不一致", "error");
              return;
            }
            try {
              await api.put("/api/password", {
                oldPassword: md5(this.passwordForm.oldPassword),
                newPassword: md5(this.passwordForm.newPassword),
              });
              this.closePasswordModal();
              this.showToast("密码已修改", "success");
            } catch (error) {
              const msg = error.response?.data?.error || "修改失败";
              this.showToast(msg, "error");
            }
          },
          async saveGroup() {
            // 将多行文本转换为数组，过滤空行
            const proxiesArray = this.formData.proxies
              .split("\n")
              .map((p) => p.trim())
              .filter((p) => p);

            try {
              const payload = {
                name: this.formData.name,
                proxies: proxiesArray,
              };

              if (this.isEditing) {
                await api.put(`/api/groups/${this.editingGroupId}`, payload);
                this.showToast("分组已更新", "success");
              } else {
                await api.post("/api/groups", payload);
                this.showToast("分组已创建", "success");
              }
              this.closeModal();
              await this.loadGroups();
            } catch (error) {
              this.showToast("保存失败", "error");
            }
          },
          async deleteGroup(id) {
            if (!confirm("确定要删除这个分组吗？")) return;
            try {
              await api.delete(`/api/groups/${id}`);
              this.showToast("分组已删除", "success");
              await this.loadGroups();
            } catch (error) {
              this.showToast("删除失败", "error");
            }
          },
          getSubscriptionUrl(id) {
            return `${window.location.origin}/subscription/${id}`;
          },
          async copyUrl(id) {
            const url = this.getSubscriptionUrl(id);
            try {
              await navigator.clipboard.writeText(url);
              this.showToast("地址已复制", "success");
            } catch (error) {
              // 备用方案
              const input = document.createElement("input");
              input.value = url;
              document.body.appendChild(input);
              input.select();
              document.execCommand("copy");
              document.body.removeChild(input);
              this.showToast("地址已复制", "success");
            }
          },
          formatDate(dateString) {
            if (!dateString) return "";
            const date = new Date(dateString);
            return date.toLocaleDateString("zh-CN", {
              year: "numeric",
              month: "2-digit",
              day: "2-digit",
              hour: "2-digit",
              minute: "2-digit",
            });
          },
          showToast(message, type = "success") {
            this.toast.message = message;
            this.toast.type = type;
            setTimeout(() => {
              this.toast.message = "";
            }, 3000);
          },
        },
      }).mount("#app");
    </script>
  </body>
